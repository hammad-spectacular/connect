<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connect — Peer Study Groups</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F7F5F0;
  --bg-card: #FFFFFF;
  --bg-secondary: #F0EDE8;
  --bg-input: #FFFFFF;
  --bg-hover: #F7F5F0;
  --text: #1C1917;
  --text-2: #57534E;
  --text-3: #A8A29E;
  --border: #E7E5E0;
  --border-2: #D6D3CE;
  --accent: #2563EB;
  --accent-bg: #EFF6FF;
  --accent-text: #1D4ED8;
  --accent-2: #7C3AED;
  --green-bg: #F0FDF4;
  --green-text: #166534;
  --red-bg: #FEF2F2;
  --red-text: #991B1B;
  --amber-bg: #FFFBEB;
  --amber-text: #92400E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-pill: 100px;
  --font: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0C0A09;
  --bg-card: #1C1917;
  --bg-secondary: #292524;
  --bg-input: #1C1917;
  --bg-hover: #292524;
  --text: #FAFAF9;
  --text-2: #A8A29E;
  --text-3: #57534E;
  --border: #292524;
  --border-2: #3C3836;
  --accent: #3B82F6;
  --accent-bg: #1E3A5F;
  --accent-text: #93C5FD;
  --accent-2: #A78BFA;
  --green-bg: #052E16;
  --green-text: #86EFAC;
  --red-bg: #450A0A;
  --red-text: #FCA5A5;
  --amber-bg: #451A03;
  --amber-text: #FCD34D;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}

/* NOISE TEXTURE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ANIMATED GRADIENT BG BLOBS */
.bg-blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
  animation: blobFloat 12s ease-in-out infinite alternate;
}
[data-theme="dark"] .bg-blob { opacity: 0.12; }
.bg-blob-1 { width: 500px; height: 500px; background: #2563EB; top: -100px; right: -100px; animation-delay: 0s; }
.bg-blob-2 { width: 400px; height: 400px; background: #7C3AED; bottom: 100px; left: -80px; animation-delay: -5s; }
.bg-blob-3 { width: 300px; height: 300px; background: #0891B2; top: 50%; left: 40%; animation-delay: -9s; }
@keyframes blobFloat {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(30px, 20px) scale(1.08); }
}

.app-wrap {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.logo-area { display: flex; flex-direction: column; gap: 2px; }
.logo {
  font-family: var(--font);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}
.logo .dot { color: var(--accent); }
.tagline { font-size: 12px; color: var(--text-3); font-weight: 400; letter-spacing: 0.3px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* THEME TOGGLE */
.theme-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-2);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}
.theme-btn:hover { transform: scale(1.07); box-shadow: var(--shadow); }

/* NAME INPUT AREA */
.name-wrap {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
}
.name-wrap:focus-within { box-shadow: 0 0 0 3px rgba(37,99,235,0.15), var(--shadow-sm); border-color: var(--accent); }
.name-input {
  padding: 9px 14px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: var(--font-body);
  color: var(--text);
  width: 150px;
  outline: none;
}
.name-input::placeholder { color: var(--text-3); }
.name-btn {
  padding: 9px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 13px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  white-space: nowrap;
}
.name-btn:hover { background: var(--accent-2); }
.name-btn:active { transform: scale(0.97); }

/* Hide manual name input when authenticated */
.name-wrap.hidden { display: none; }

/* USER BAR */
.user-bar {
  display: none;
  align-items: center;
  gap: 10px;
  background: var(--accent-bg);
  border: 1px solid;
  border-color: color-mix(in srgb, var(--accent) 30%, transparent);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  margin-bottom: 1.5rem;
  font-size: 13px;
  color: var(--accent-text);
  font-weight: 500;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-family: var(--font);
  font-weight: 700;
  flex-shrink: 0;
}

/* TABS */
/* Category-style navigation (non-technical, easier to spot) */
.tabs {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 1.75rem;
}
.tab {
  width: 100%;
  text-align: left;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.tab:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: var(--border-2); }
.tab:active { transform: scale(0.99) translateY(0); }
.tab.active {
  border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12), var(--shadow-sm);
}
.tab-ic {
  width: 36px; height: 36px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 18px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
}
.tab.active .tab-ic {
  background: var(--accent-bg);
  border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
}
.tab-txt { min-width: 0; }
.tab-title {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.tab-sub {
  margin-top: 3px;
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.35;
}
.tab.active .tab-sub { color: var(--text-2); }

/* SECTIONS */
.section { display: none; animation: fadeUp 0.25s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* SEARCH */
.search-wrap {
  position: relative;
  margin-bottom: 1rem;
}
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 15px;
  pointer-events: none;
}
.search-bar {
  width: 100%;
  padding: 11px 140px 11px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  outline: none;
  transition: all var(--transition);
}
.search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12), var(--shadow-sm); }
.search-bar::placeholder { color: var(--text-3); }

/* Search loading indicator */
.search-load {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-3);
  padding: 6px 10px;
  border-radius: var(--radius-pill);
  background: color-mix(in srgb, var(--bg-card) 75%, transparent);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.search-load.show { opacity: 1; }
.search-load .spinner {
  width: 12px; height: 12px;
  border-width: 2px;
  border-color: var(--border-2);
  border-top-color: var(--accent);
}

/* FILTER CHIPS */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.chip {
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-2);
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-2);
  transition: all var(--transition);
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,0.3); }

/* CARDS */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  opacity: 0;
  transition: opacity var(--transition);
}
.card:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: var(--border-2); }
.card:hover::before { opacity: 1; }

.card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.card-title { font-family: var(--font); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; font-weight: 400; }
.badge-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 1; max-width: 52%; }

@media (max-width: 600px) {
  /* Prevent badge overflow on small screens */
  .card-head { flex-direction: column; align-items: stretch; }
  .badge-row { justify-content: flex-start; max-width: 100%; }
}

/* BADGES */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-family: var(--font);
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.badge-blue { background: var(--accent-bg); color: var(--accent-text); }
.badge-green { background: var(--green-bg); color: var(--green-text); }
.badge-red { background: var(--red-bg); color: var(--red-text); }
.badge-amber { background: var(--amber-bg); color: var(--amber-text); }

/* CARD META */
.meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0; }
.meta-item { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
.card-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 10px; }

/* MEMBERS */
.members-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; margin-bottom: 2px; }
.m-chip {
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-2);
  transition: all var(--transition);
}
.m-chip.you { background: var(--accent-bg); border-color: color-mix(in srgb, var(--accent) 30%, transparent); color: var(--accent-text); }

/* CARD ACTIONS */
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* BUTTONS */
.btn {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-2);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  background: var(--bg-secondary);
  color: var(--text);
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-2); transform: translateY(-1px); }
.btn:active { transform: scale(0.97) translateY(0); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
.btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.btn-danger { background: var(--red-bg); color: var(--red-text); border-color: color-mix(in srgb, var(--red-text) 20%, transparent); }
.btn-danger:hover { filter: brightness(0.92); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* FORM */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; box-shadow: var(--shadow-sm); }
.form-title { font-family: var(--font); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-family: var(--font); font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; }
.form-input {
  padding: 10px 13px;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  background: var(--bg-input);
  color: var(--text);
  outline: none;
  transition: all var(--transition);
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
.form-input::placeholder { color: var(--text-3); }
select.form-input { cursor: pointer; }
textarea.form-input { resize: vertical; min-height: 90px; }
.form-full { grid-column: 1 / -1; }
.form-actions { display: flex; gap: 8px; margin-top: 4px; }
.form-error {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--red-bg);
  border: 1px solid color-mix(in srgb, var(--red-text) 20%, transparent);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--red-text);
  display: none;
  animation: slideDown 0.2s ease;
}

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.stat-card:hover::after { transform: scaleX(1); }
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.stat-num { font-family: var(--font); font-size: 38px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-label { font-size: 12px; color: var(--text-3); margin-top: 6px; font-weight: 500; font-family: var(--font); text-transform: uppercase; letter-spacing: 0.5px; }
.dept-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.4rem; box-shadow: var(--shadow-sm); }
.dept-title { font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
.dept-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.dept-label { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dept-bar-wrap { flex: 2; height: 6px; background: var(--bg-secondary); border-radius: var(--radius-pill); overflow: hidden; }
.dept-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: var(--radius-pill); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.dept-count { font-size: 12px; color: var(--text-3); font-weight: 600; min-width: 20px; text-align: right; font-family: var(--font); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-family: var(--font); font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.5; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--text);
  color: var(--bg);
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  z-index: 9999;
  box-shadow: var(--shadow-lg);
  max-width: 280px;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* MODAL CONFIRM */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  padding: 1.75rem;
  max-width: 380px;
  width: 90%;
  box-shadow: var(--shadow-lg);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-title { font-family: var(--font); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal-text { font-size: 14px; color: var(--text-2); margin-bottom: 1.25rem; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
  .tabs { grid-template-columns: 1fr 1fr; }
  .tab { padding: 11px 12px; }
  .header { gap: 12px; }
}
/* SPINNER & LOADING STATES */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: currentColor; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn.loading { position: relative; pointer-events: none; opacity: 0.7; }
.btn-primary.loading .spinner { border-top-color: #fff; }
.btn:not(.btn-primary).loading .spinner { border-color: rgba(0,0,0,0.1); border-top-color: var(--text); }
[data-theme="dark"] .btn:not(.btn-primary).loading .spinner { border-color: rgba(255,255,255,0.1); border-top-color: var(--text); }
</style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="app-wrap">
  <!-- HEADER -->
  <header class="header">
    <div class="logo-area">
      <div class="logo">Connect<span class="dot">.</span></div>
      <div class="tagline">Find your study group &mdash; grow together</div>
    </div>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn" id="editNameBtn" onclick="editName()" style="display:none">Edit name</button>
      <button class="btn" id="logoutBtn" onclick="logout()" style="display:none">Log out</button>
      <div class="name-wrap" id="nameWrap">
        <input id="nameInput" class="name-input" placeholder="Your name…" onkeydown="if(event.key==='Enter')setUser()" />
        <button class="name-btn" onclick="setUser()">Set name</button>
      </div>
    </div>
  </header>

  <!-- USER BAR -->
  <div class="user-bar" id="userBar">
    <div class="avatar" id="avatarEl">?</div>
    <span id="userLabel">Welcome —</span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" aria-label="Browse groups">
      <div class="tab-ic">🔎</div>
      <div class="tab-txt">
        <div class="tab-title">Find a Group</div>
        <div class="tab-sub">Browse & search by subject</div>
      </div>
    </button>
    <button class="tab" onclick="switchTab('create')" aria-label="Create a group">
      <div class="tab-ic">➕</div>
      <div class="tab-txt">
        <div class="tab-title">Start a Group</div>
        <div class="tab-sub">Create a new study session</div>
      </div>
    </button>
    <button class="tab" onclick="switchTab('mine')" aria-label="My groups">
      <div class="tab-ic">👤</div>
      <div class="tab-txt">
        <div class="tab-title">My Groups</div>
        <div class="tab-sub">Groups you joined or made</div>
      </div>
    </button>
    <button class="tab" onclick="switchTab('stats')" aria-label="Overview">
      <div class="tab-ic">📊</div>
      <div class="tab-txt">
        <div class="tab-title">Overview</div>
        <div class="tab-sub">Quick stats & departments</div>
      </div>
    </button>
  </div>

  <!-- BROWSE -->
  <div class="section active" id="tab-browse">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-bar" id="searchInput" placeholder="Search subject, topic or department…" oninput="handleSearchInput()" />
      <div class="search-load" id="searchLoad" aria-live="polite">
        <span class="spinner"></span>
        <span>Searching…</span>
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div id="groupsList"></div>
  </div>

  <!-- CREATE -->
  <div class="section" id="tab-create">
    <div class="form-card">
      <div class="form-title">Create a study group</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Group name *</label>
          <input class="form-input" id="f-name" placeholder="e.g. HCI Final Prep" />
        </div>
        <div class="form-group">
          <label class="form-label">Subject / Course *</label>
          <input class="form-input" id="f-subject" placeholder="e.g. Human Computer Interaction" />
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <select class="form-input" id="f-dept">
            <option value="">Select department</option>
            <option>Software Engineering</option>
            <option>Computer Science</option>
            <option>Electrical Engineering</option>
            <option>Business Administration</option>
            <option>Data Science</option>
            <option>Cybersecurity</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Max members</label>
          <input class="form-input" id="f-max" type="number" min="2" max="20" value="6" />
        </div>
        <div class="form-group">
          <label class="form-label">Session date & time</label>
          <input class="form-input" id="f-time" type="datetime-local" />
        </div>
        <div class="form-group">
          <label class="form-label">Location / Platform</label>
          <input class="form-input" id="f-location" placeholder="Library Room 3 / Google Meet" />
        </div>
        <div class="form-group form-full">
          <label class="form-label">Description</label>
          <textarea class="form-input" id="f-desc" placeholder="What will the group focus on? Any requirements or prerequisites?"></textarea>
        </div>
      </div>
      <div class="form-actions" style="margin-top:1.25rem">
        <button class="btn btn-primary" onclick="createGroup()">✦ Create group</button>
        <button class="btn" onclick="clearForm()">Clear</button>
      </div>
      <div class="form-error" id="form-error"></div>
    </div>
  </div>

  <!-- MY GROUPS -->
  <div class="section" id="tab-mine">
    <div id="myGroupsList"></div>
  </div>

  <!-- STATS -->
  <div class="section" id="tab-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-label">Total groups</div></div>
      <div class="stat-card"><div class="stat-num" id="st-members">0</div><div class="stat-label">Total members</div></div>
      <div class="stat-card"><div class="stat-num" id="st-open">0</div><div class="stat-label">Open spots</div></div>
    </div>
    <div id="dept-breakdown"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Delete this group?</div>
    <div class="modal-text">This action cannot be undone. All members will lose access to this group.</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modalConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<!-- FIREBASE SDKS -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
// FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyAOGEcSTVKpQJHCtvWI0qeMNq54W38pPEE",
  authDomain: "connect-f1907.firebaseapp.com",
  databaseURL: "https://connect-f1907-default-rtdb.firebaseio.com",
  projectId: "connect-f1907",
  storageBucket: "connect-f1907.firebasestorage.app",
  messagingSenderId: "568969172995",
  appId: "1:568969172995:web:ec9cbad8d6722b1f6d5636",
  measurementId: "G-820XY1PEWX"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = '', groups = [], activeFilter = 'All', isDark = false, pendingDeleteId = null;
let initialLoad = true;
let searchDebounceTimer = null;
let searchLoadingTimer = null;
let isSearching = false;

// AUTO LOGOUT (idle timeout)
const IDLE_TIMEOUT_MS = 10 * 60 * 1000; // 10 minutes
const IDLE_WARN_MS = 60 * 1000; // 1 minute warning before logout
let idleTimer = null;
let idleWarnTimer = null;
let idleArmed = false;
const ACTIVITY_KEY = 'connect-last-activity';
const IDLE_LOGOUT_KEY = 'connect-idle-logout';

// LOCAL STORAGE (For User & Theme)
function save(key, val) { try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); } catch(e){} }
function load(key, fallback) { try { const v = localStorage.getItem(key); return v !== null ? v : fallback; } catch(e){ return fallback; } }

function init() {
  // AUTH GATE: require sign-in
  firebase.auth().onAuthStateChanged((user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Use auth identity as the "currentUser" shown in UI
    const label = userLabelFromAuth(user);
    if (label) {
      currentUser = label;
      save('connect-user', label);
      document.getElementById('nameInput').value = label;
      applyUser();
    }

    // Authenticated: show logout, hide manual name input
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.style.display = 'inline-flex';
    const editNameBtn = document.getElementById('editNameBtn');
    if (editNameBtn) editNameBtn.style.display = 'inline-flex';
    const nameWrap = document.getElementById('nameWrap');
    if (nameWrap) nameWrap.classList.add('hidden');

    // Arm idle logout only when authenticated
    armIdleLogout();
  });

  currentUser = load('connect-user', '');
  if(currentUser) {
    document.getElementById('nameInput').value = currentUser;
    applyUser();
    // If user was restored from storage, make logout visible too (UI consistency)
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.style.display = 'inline-flex';
    const editNameBtn = document.getElementById('editNameBtn');
    if (editNameBtn) editNameBtn.style.display = 'inline-flex';
    const nameWrap = document.getElementById('nameWrap');
    if (nameWrap) nameWrap.classList.add('hidden');
  }
  isDark = load('connect-theme', 'light') === 'dark';
  applyTheme();
  renderAll();

  // REALTIME DB LISTENER
  db.ref('groups').on('value', (snapshot) => {
    initialLoad = false;
    const data = snapshot.val();
    if (data) {
      groups = Object.keys(data).map(key => ({ dbId: key, ...data[key] }));
      groups.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    } else {
      groups = [];
    }
    renderAll();
  }, (err) => {
    console.error(err);
    showToast('Failed to connect to database');
    initialLoad = false;
    renderAll();
  });
}

function renderAll() { renderGroups(); renderMyGroups(); renderStats(); renderFilters(); }

/* THEME & USER */
function toggleTheme() {
  isDark = !isDark;
  applyTheme();
  save('connect-theme', isDark ? 'dark' : 'light');
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}
function setUser() {
  const v = document.getElementById('nameInput').value.trim();
  if(!v) { showToast('Please enter your name'); return; }
  currentUser = v;
  save('connect-user', v);
  applyUser();
  renderAll(); // Re-render to reflect new name
  showToast('Welcome, ' + v + '! 👋');
}
function applyUser() {
  document.getElementById('userBar').style.display = 'flex';
  document.getElementById('userLabel').textContent = 'Logged in as ' + currentUser;
  document.getElementById('avatarEl').textContent = currentUser.slice(0,2).toUpperCase();
}

function userLabelFromAuth(user) {
  if (!user) return '';
  const dn = (user.displayName || '').trim();
  if (dn) return dn;
  const em = (user.email || '').trim();
  if (em) return em.split('@')[0];
  return 'User';
}

async function editName() {
  const u = firebase.auth().currentUser;
  if (!u) { showToast('Please sign in again'); window.location.href = 'login.html'; return; }
  const current = (u.displayName || currentUser || '').trim();
  const next = (window.prompt('Enter your name', current) || '').trim();
  if (!next) return;
  if (next.length > 32) { showToast('Name is too long'); return; }

  try {
    await u.updateProfile({ displayName: next });
    currentUser = next;
    save('connect-user', next);
    applyUser();
    renderAll();
    showToast('Name updated');
  } catch (e) {
    console.error(e);
    showToast('Could not update name');
  }
}

async function logout() {
  try {
    await firebase.auth().signOut();
  } finally {
    // Keep theme, clear name fallback
    try { localStorage.removeItem('connect-user'); } catch(e) {}
    window.location.href = 'login.html';
  }
}

function logoutDueToIdle() {
  try { localStorage.setItem(IDLE_LOGOUT_KEY, '1'); } catch (e) {}
  logout();
}

function noteActivity() {
  const now = String(Date.now());
  try { localStorage.setItem(ACTIVITY_KEY, now); } catch (e) {}
  scheduleIdleTimers();
}

function getLastActivityMs() {
  const v = load(ACTIVITY_KEY, '');
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? n : Date.now();
}

function clearIdleTimers() {
  if (idleTimer) clearTimeout(idleTimer);
  if (idleWarnTimer) clearTimeout(idleWarnTimer);
  idleTimer = null;
  idleWarnTimer = null;
}

function scheduleIdleTimers() {
  if (!idleArmed) return;
  clearIdleTimers();

  const last = getLastActivityMs();
  const now = Date.now();
  const elapsed = now - last;
  const remaining = IDLE_TIMEOUT_MS - elapsed;
  const warnRemaining = remaining - IDLE_WARN_MS;

  if (remaining <= 0) {
    logoutDueToIdle();
    return;
  }

  if (warnRemaining > 0) {
    idleWarnTimer = setTimeout(() => {
      // Only warn if still logged in
      if (firebase.auth().currentUser) showToast('You’ll be logged out soon due to inactivity.');
    }, warnRemaining);
  }

  idleTimer = setTimeout(() => {
    if (firebase.auth().currentUser) logoutDueToIdle();
  }, remaining);
}

function armIdleLogout() {
  if (idleArmed) return;
  idleArmed = true;

  // Seed activity at time of login
  noteActivity();

  // User interaction events
  const events = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'pointerdown'];
  events.forEach((ev) => window.addEventListener(ev, noteActivity, { passive: true }));
  window.addEventListener('focus', noteActivity);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) noteActivity(); });

  // Cross-tab sync: when activity is recorded in another tab, reset timers here too
  window.addEventListener('storage', (e) => {
    if (e && e.key === ACTIVITY_KEY) scheduleIdleTimers();
  });
}

/* TABS */
function switchTab(name) {
  const order = ['browse','create','mine','stats'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', order[i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if(name === 'mine') renderMyGroups();
  if(name === 'stats') renderStats();
  if(name === 'browse') renderGroups();
}

/* SEARCH UX (debounced + visible "searching" indicator) */
function setSearchLoading(on) {
  isSearching = !!on;
  const loadEl = document.getElementById('searchLoad');
  if (!loadEl) return;
  loadEl.classList.toggle('show', isSearching);
}
function handleSearchInput() {
  // If data isn't loaded yet, keep existing "Loading groups..." state.
  if (initialLoad) return;

  // Debounce so users see feedback while typing and UI doesn't feel abrupt.
  clearTimeout(searchDebounceTimer);
  clearTimeout(searchLoadingTimer);

  // Show loader only if the user pauses briefly (prevents flicker on single keystrokes).
  searchLoadingTimer = setTimeout(() => setSearchLoading(true), 120);

  searchDebounceTimer = setTimeout(() => {
    setSearchLoading(false);
    renderGroups();
  }, 320);
}

/* FILTERS */
function renderFilters() {
  const depts = ['All', ...new Set(groups.map(g => g.dept).filter(Boolean))];
  document.getElementById('filterRow').innerHTML = depts.map(d =>
    `<div class="chip ${d===activeFilter?'active':''}" onclick="setFilter('${d}')">${d}</div>`
  ).join('');
}
function setFilter(d) { activeFilter = d; renderFilters(); renderGroups(); }

/* UI STATE HELPERS */
function startButtonLoad(btnId, isModal = false) {
  const btn = isModal ? document.getElementById(btnId) : document.querySelector(`button[onclick*="'${btnId}'"], button[onclick*="${btnId}"]`);
  if (!btn) return null;
  const originalHtml = btn.innerHTML;
  btn.classList.add('loading');
  btn.innerHTML = `<span class="spinner"></span> Processing...`;
  return { btn, originalHtml };
}
function endButtonLoad(state) {
  if (!state) return;
  state.btn.classList.remove('loading');
  state.btn.innerHTML = state.originalHtml;
}

/* GROUPS LIST */
function renderGroups() {
  const el = document.getElementById('groupsList');
  if(initialLoad) {
    el.innerHTML = `<div class="empty"><span class="spinner" style="border-top-color: var(--accent); border-color: var(--border-2); width: 30px; height: 30px;"></span><div class="empty-title" style="margin-top: 15px;">Loading groups...</div></div>`;
    return;
  }
  // Ensure loader is not stuck if something triggered a render directly.
  setSearchLoading(false);
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = groups.filter(g => {
    const ms = !q || g.name.toLowerCase().includes(q) || g.subject.toLowerCase().includes(q) || (g.dept||'').toLowerCase().includes(q);
    const mf = activeFilter === 'All' || g.dept === activeFilter;
    return ms && mf;
  });
  if(!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔭</div><div class="empty-title">No groups found</div><div class="empty-sub">Try a different search term<br>or create a new group.</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(g => buildCard(g)).join('');
}

function renderMyGroups() {
  const el = document.getElementById('myGroupsList');
  if(initialLoad) {
    el.innerHTML = `<div class="empty"><span class="spinner" style="border-top-color: var(--accent); border-color: var(--border-2); width: 30px; height: 30px;"></span><div class="empty-title" style="margin-top: 15px;">Loading groups...</div></div>`;
    return;
  }
  if(!currentUser) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">Set your name first</div><div class="empty-sub">Enter your name at the top<br>to track your groups.</div></div>`;
    return;
  }
  const mine = groups.filter(g => g.creator === currentUser || (g.members||[]).includes(currentUser));
  if(!mine.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><div class="empty-title">No groups yet</div><div class="empty-sub">Browse to join a group<br>or create your own.</div></div>`;
    return;
  }
  el.innerHTML = mine.map(g => buildCard(g)).join('');
}

function buildCard(g) {
  const mc = (g.members||[]).length;
  const isFull = mc >= g.max;
  const isJoined = (g.members||[]).includes(currentUser);
  const isCreator = g.creator === currentUser;
  const timeStr = g.time ? new Date(g.time).toLocaleString('en-PK',{dateStyle:'medium',timeStyle:'short'}) : 'TBD';

  const spotsBadge = isFull
    ? `<span class="badge badge-red">Full</span>`
    : `<span class="badge badge-green">${g.max - mc} spot${g.max-mc!==1?'s':''} open</span>`;
  const deptBadge = g.dept ? `<span class="badge badge-blue">${g.dept}</span>` : '';
  const roleBadge = isCreator ? `<span class="badge badge-amber">⭐ Owner</span>` : isJoined ? `<span class="badge badge-blue">Joined</span>` : '';

  const membersHtml = mc ? `<div class="members-list">${(g.members||[]).map(m =>
    `<div class="m-chip ${m===currentUser?'you':''}">${m}${m===currentUser?' (you)':''}</div>`
  ).join('')}</div>` : '';

  let action = '';
  if(isCreator) action = `<button class="btn btn-danger" onclick="confirmDelete('${g.dbId}')">🗑 Delete</button>`;
  else if(isJoined) action = `<button class="btn" onclick="leaveGroup('${g.dbId}')">Leave group</button>`;
  else if(!isFull) action = `<button class="btn btn-primary" onclick="joinGroup('${g.dbId}')">Join group →</button>`;
  else action = `<button class="btn" disabled>Group full</button>`;

  return `<div class="card">
    <div class="card-head">
      <div>
        <div class="card-title">${g.name}</div>
        <div class="card-sub">${g.subject} &bull; by ${g.creator}</div>
      </div>
      <div class="badge-row">${roleBadge}${spotsBadge}${deptBadge}</div>
    </div>
    ${g.desc ? `<div class="card-desc">${g.desc}</div>` : ''}
    <div class="meta-row">
      <div class="meta-item">📅 <span>${timeStr}</span></div>
      <div class="meta-item">📍 <span>${g.location || 'Not specified'}</span></div>
      <div class="meta-item">👥 <span>${mc}/${g.max} members</span></div>
    </div>
    ${membersHtml}
    <div class="card-actions">${action}</div>
  </div>`;
}

/* STATS */
function renderStats() {
  const total = groups.length;
  const totalM = groups.reduce((s,g) => s + (g.members||[]).length, 0);
  const open = groups.reduce((s,g) => s + Math.max(0, g.max - (g.members||[]).length), 0);
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-members').textContent = totalM;
  document.getElementById('st-open').textContent = open;

  const depts = {};
  groups.forEach(g => { if(g.dept) depts[g.dept] = (depts[g.dept]||0)+1; });
  const bd = document.getElementById('dept-breakdown');
  if(!Object.keys(depts).length) { bd.innerHTML = ''; return; }
  const max = Math.max(...Object.values(depts));
  bd.innerHTML = `<div class="dept-card">
    <div class="dept-title">Groups by department</div>
    ${Object.entries(depts).sort((a,b)=>b[1]-a[1]).map(([d,c]) =>
      `<div class="dept-row">
        <div class="dept-label">${d}</div>
        <div class="dept-bar-wrap"><div class="dept-bar" style="width:${Math.round(c/max*100)}%"></div></div>
        <div class="dept-count">${c}</div>
      </div>`
    ).join('')}
  </div>`;
}

/* DB OPERATIONS */
async function createGroup() {
  if(!currentUser) { showFormError('Please set your name first (top right).'); return; }
  
  const name = document.getElementById('f-name').value.trim();
  const subject = document.getElementById('f-subject').value.trim();
  const err = document.getElementById('form-error');
  
  if(!name) { showFormError('Group name is required.'); return; }
  if(!subject) { showFormError('Subject / Course is required.'); return; }
  err.style.display = 'none';

  const g = {
    name, subject,
    dept: document.getElementById('f-dept').value,
    max: parseInt(document.getElementById('f-max').value) || 6,
    time: document.getElementById('f-time').value,
    location: document.getElementById('f-location').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    creator: currentUser, 
    members: [currentUser],
    createdAt: new Date().toISOString()
  };

  const loadState = startButtonLoad('createGroup');
  try {
    const newRef = db.ref('groups').push();
    await newRef.set(g);
    clearForm();
    switchTab('browse');
    showToast('Group created! ✦');
  } catch (error) {
    showFormError('Failed to create group. Database error.');
    console.error(error);
  } finally {
    endButtonLoad(loadState);
  }
}

function showFormError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearForm() {
  ['f-name','f-subject','f-dept','f-time','f-location','f-desc'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('f-max').value = '6';
  document.getElementById('form-error').style.display = 'none';
}

async function joinGroup(dbId) {
  if(!currentUser) { showToast('Set your name first'); return; }
  const g = groups.find(x => x.dbId === dbId); if(!g) return;
  if((g.members||[]).includes(currentUser)) { showToast('Already in this group'); return; }
  if((g.members||[]).length >= g.max) { showToast('This group is full'); return; }
  
  const loadState = startButtonLoad(dbId);
  try {
    const newMembers = [...(g.members||[]), currentUser];
    await db.ref('groups/' + dbId).update({ members: newMembers });
    showToast('Joined "' + g.name + '"! 🎉');
  } catch(err) {
    console.error(err);
    showToast('Failed to join group.');
  } finally {
    endButtonLoad(loadState);
  }
}

async function leaveGroup(dbId) {
  const g = groups.find(x => x.dbId === dbId); if(!g) return;
  
  const loadState = startButtonLoad(dbId);
  try {
    const newMembers = (g.members||[]).filter(m => m !== currentUser);
    await db.ref('groups/' + dbId).update({ members: newMembers });
    showToast('Left "' + g.name + '"');
  } catch(err) {
    console.error(err);
    showToast('Failed to leave group.');
  } finally {
    endButtonLoad(loadState);
  }
}

/* DELETE WITH MODAL */
function confirmDelete(dbId) {
  pendingDeleteId = dbId;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalConfirmBtn').onclick = () => { doDelete(); };
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingDeleteId = null;
}
async function doDelete() {
  if (!pendingDeleteId) return;
  
  const loadState = startButtonLoad('modalConfirmBtn', true);
  try {
    await db.ref('groups/' + pendingDeleteId).remove();
    showToast('Group deleted');
    closeModal();
  } catch(err) {
    console.error(err);
    showToast('Failed to delete group.');
  } finally {
    endButtonLoad(loadState);
  }
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

/* TOAST */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

init();
</script>
